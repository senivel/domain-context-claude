<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 290" width="580" height="290" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-mm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Row 1: bin/install.js -->
  <rect x="210" y="20" width="160" height="44" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="290" y="48" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">bin/install.js</text>

  <!-- Row 2: modules -->
  <rect x="10" y="120" width="140" height="44" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="80" y="148" text-anchor="middle" font-size="13" fill="#333">commands/dc/</text>

  <rect x="170" y="120" width="100" height="44" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="220" y="148" text-anchor="middle" font-size="13" fill="#333">hooks/</text>

  <rect x="290" y="120" width="100" height="44" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="340" y="148" text-anchor="middle" font-size="13" fill="#333">agents/</text>

  <rect x="410" y="120" width="100" height="44" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="460" y="148" text-anchor="middle" font-size="13" fill="#333">rules/</text>

  <!-- Row 3: dependencies -->
  <rect x="0" y="224" width="110" height="40" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="55" y="249" text-anchor="middle" font-size="13" fill="#333">templates/</text>

  <rect x="126" y="224" width="90" height="40" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="171" y="249" text-anchor="middle" font-size="13" fill="#333">tools/</text>

  <rect x="260" y="224" width="200" height="40" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="360" y="249" text-anchor="middle" font-size="13" fill="#333">.context/MANIFEST.md</text>

  <!-- Arrows: install.js → modules -->
  <path d="M 255 64 Q 170 92 100 118" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow-mm)"/>
  <path d="M 275 64 Q 250 92 230 118" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow-mm)"/>
  <path d="M 310 64 Q 325 92 335 118" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow-mm)"/>
  <path d="M 335 64 Q 395 92 445 118" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow-mm)"/>

  <!-- Arrows: commands → templates, tools -->
  <path d="M 55 164 Q 50 194 50 222" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow-mm)"/>
  <path d="M 110 164 Q 140 194 160 222" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow-mm)"/>

  <!-- Arrow: hooks → MANIFEST.md -->
  <path d="M 240 164 Q 290 194 330 222" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow-mm)"/>
</svg>
